# DigitalOcean Functions config for the /api/signup waitlist endpoint.
# RESEND_API_KEY is declared below and also set as an encrypted env var on the
# component; DO substitutes the component value into the function at build and
# runtime. Keep exactly one variable here.
# NOTE: do not write a dollar-brace token in comments — DO's template engine
# scans the whole file (comments included) and treats it as a variable.
packages:
  - name: api
    functions:
      - name: signup
        runtime: 'nodejs:18'
        web: true
        environment:
          RESEND_API_KEY: "${RESEND_API_KEY}"
        limits:
          timeout: 10000
