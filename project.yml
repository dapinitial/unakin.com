# DigitalOcean Functions config for the /api/signup waitlist endpoint.
# RESEND_API_KEY must be declared here (so the function receives it) AND set
# as an encrypted env var on the component — the ${...} binds the component
# value into the function runtime. They must match, with no extra/blank vars.
packages:
  - name: api
    functions:
      - name: signup
        runtime: 'nodejs:18'
        web: true
        environment:
          RESEND_API_KEY: "${RESEND_API_KEY}"
        limits:
          timeout: 10000
